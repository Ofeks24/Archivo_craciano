{% extends "base.html" %}

{% block login %}

<div class="login">
  <div class="login-sigil">⚜</div>

  <article>
    <h2 style="text-align:center; border-bottom:none; padding-bottom:0;">
      Acceso al Archivo Craciano
    </h2>

    <p style="text-align:center; font-style:italic; color:var(--texto-suave); margin-bottom:28px; font-size:15px;">
      Solo los custodios autorizados pueden atravesar los sellos del Archivo.
    </p>

    {% if error %}
      <p class="mensaje error" style="margin-bottom:18px;">⚠ {{ error }}</p>
    {% endif %}

    <form method="post" action="/login">
      <input type="email" name="email" placeholder="Correo del custodio…" required autofocus>
      <input type="password" name="password" placeholder="Contraseña arcana…" required>
      <button>⸻ Atravesar los Sellos ⸻</button>
    </form>

    <p class="pequeno" style="text-align:center; margin-top:20px;">
      ✦ El Archivo recuerda a sus custodios. Procede con cautela.
    </p>
  </article>
</div>

{% endblock %}
